<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasure Hunt</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #004494;
        }
        #result-container {
            margin-top: 2rem;
            display: none; /* Hidden until the key is correct */
        }
        img {
            max-width: 100%;
            border-radius: 4px;
        }
        .error {
            color: #d9534f;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Enter the Secret Word</h2>
        
        <!-- The Garbled Image Canvas -->
        <canvas id="garbled-canvas" width="300" height="200" style="margin: 1rem auto; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); max-width: 100%; display: block;"></canvas>
        <p id="loading-text" style="font-size: 14px; color: #888; margin-bottom: 1rem;">Receiving encrypted signal...</p>
        
        <input type="text" id="keyword" placeholder="Type the keyword..." autocomplete="off">
        <br>
        <button onclick="attemptDecryption()">Reveal Destination</button>
        <div id="error-message" class="error">Incorrect keyword or missing data. Keep hunting!</div>
        
        <div id="result-container">
            <h3>You found it!</h3>
            <img id="destination-image" src="" alt="Hidden Destination">
        </div>
    </div>

    <script>
        async function attemptDecryption() {
            (async function paintStatic() {
            const canvas = document.getElementById('garbled-canvas');
            if (!canvas) return; 
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(canvas.width, canvas.height);
            const loadText = document.getElementById('loading-text');

            try {
                const response = await fetch('encrypted_data.json');
                if (!response.ok) throw new Error("Could not find the map file.");
                const data = await response.json();
                
                if (!data.ciphertext) throw new Error("Ciphertext is missing from JSON.");

                // Decode Base64 directly (much faster, uses half the memory)
                const ciphertextStr = atob(data.ciphertext);
                const len = ciphertextStr.length;

                // Paint the bytes onto the canvas as pixels
                let byteIdx = 0;
                for (let i = 0; i < imgData.data.length; i += 4) {
                    const val = ciphertextStr.charCodeAt(byteIdx % len);
                    imgData.data[i] = val;       // Red channel
                    imgData.data[i+1] = val;     // Green channel
                    imgData.data[i+2] = val;     // Blue channel
                    imgData.data[i+3] = 255;     // Alpha (fully opaque)
                    byteIdx++;
                }
                ctx.putImageData(imgData, 0, 0);
                loadText.innerText = "Signal encrypted. Awaiting password...";
                
            } catch (e) {
                console.error("Static noise error:", e);
                // If it fails, print the exact error on the screen for easy debugging!
                loadText.innerText = "Preview error: " + e.message;
            }
        })();
    </script>
</body>
</html>
